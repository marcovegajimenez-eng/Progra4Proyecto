<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{layout :: nav}"></nav>

<div class="auth-wrapper">
  <div class="auth-card">

    
    <h2>Login</h2>

    <div th:if="${errorMsg}"  class="alert alert-error"   th:text="${errorMsg}"></div>
    <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>

    <form method="post" th:action="@{/login}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" class="form-control" type="text"
               name="username" placeholder="Correo o identificación admin"
               required autofocus/>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" class="form-control" type="password"
               name="password" placeholder="••••••••" required/>
      </div>

      <button class="btn btn-primary w-100 mt-2" type="submit">Entrar</button>
    </form>

    <hr class="divider"/>

    <p class="text-center text-muted">
      ¿Aún no tienes cuenta?
    </p>
    <div class="btn-group mt-1" style="justify-content:center">
      <a th:href="@{/registro/empresa}"  class="btn btn-outline btn-sm">Registro Empresa</a>
      <a th:href="@{/registro/oferente}" class="btn btn-outline btn-sm">Registro Oferente</a>
    </div>

  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
