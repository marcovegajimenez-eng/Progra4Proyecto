<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Registro Oferente — Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{layout :: nav}"></nav>

<main style="max-width:560px">
  <h1 class="page-title">Registro de Oferente</h1>
  <p class="page-subtitle">
    Complete el formulario. Un administrador revisará y aprobará su solicitud.
  </p>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

  <div class="card">
    <form method="post" th:action="@{/registro/oferente}" th:object="${form}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label>Identificación *</label>
        <input class="form-control" type="text" th:field="*{identificacion}"
               placeholder="Ej. 123456789" required/>
        <span class="field-error" th:if="${#fields.hasErrors('identificacion')}"
              th:errors="*{identificacion}"></span>
      </div>

      <div class="form-group">
        <label>Nombre *</label>
        <input class="form-control" type="text" th:field="*{nombre}"
               placeholder="Nombre" required/>
        <span class="field-error" th:if="${#fields.hasErrors('nombre')}"
              th:errors="*{nombre}"></span>
      </div>

      <div class="form-group">
        <label>Primer apellido *</label>
        <input class="form-control" type="text" th:field="*{primerApellido}"
               placeholder="Apellido" required/>
        <span class="field-error" th:if="${#fields.hasErrors('primerApellido')}"
              th:errors="*{primerApellido}"></span>
      </div>

      <div class="form-group">
        <label>Nacionalidad</label>
        <input class="form-control" type="text" th:field="*{nacionalidad}"
               placeholder="Ej. Costarricense"/>
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input class="form-control" type="text" th:field="*{telefono}"
               placeholder="8888-7777"/>
      </div>

      <div class="form-group">
        <label>Correo electrónico *</label>
        <input class="form-control" type="email" th:field="*{correoElectronico}"
               placeholder="correo@ejemplo.com" required/>
        <span class="field-error" th:if="${#fields.hasErrors('correoElectronico')}"
              th:errors="*{correoElectronico}"></span>
      </div>

      <div class="form-group">
        <label>Lugar de residencia</label>
        <input class="form-control" type="text" th:field="*{lugarResidencia}"
               placeholder="Ej. San José"/>
      </div>

      <div class="btn-group mt-2">
        <button class="btn btn-primary" type="submit">Enviar registro</button>
        <a class="btn btn-secondary" th:href="@{/}">Cancelar</a>
      </div>
    </form>
  </div>

  <p class="text-muted mt-2 text-center">
    ¿Ya tienes cuenta? <a th:href="@{/login}">Iniciar sesión</a>
  </p>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
