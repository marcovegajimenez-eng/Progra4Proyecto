<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Características — Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{layout :: nav}"></nav>

<main>
  <h1 class="page-title">Características</h1>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

  <div class="split-layout">

    
    <div>
      <div class="panel">
        
        <div class="breadcrumb">
          <a th:href="@{/admin/caracteristicas}">Raíces</a>
          <span th:if="${actual != null}">
            <span class="breadcrumb-sep">/</span>
            <span th:text="${actual.ruta}"></span>
          </span>
        </div>

        <h3 th:text="${actual != null ? actual.nombre : 'Categorías raíces'}">Raíces</h3>

        
        <p th:if="${categorias.isEmpty()}" class="text-muted">
          No hay subcategorías. Puedes agregar desde el panel derecho.
        </p>

        <div class="cat-list" th:unless="${categorias.isEmpty()}">
          <div class="cat-item" th:each="c : ${categorias}">
            <span class="cat-item-name" th:text="${c.nombre}">Nombre</span>
            <div class="cat-item-actions">
              
              <a class="btn btn-primary btn-sm"
                 th:href="@{/admin/caracteristicas(padreId=${c.id})}">
                Entrar
              </a>
              
              <form method="post"
                    th:action="@{/admin/caracteristicas/{id}/eliminar(id=${c.id})}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="padreId"
                       th:value="${actual != null ? actual.id : ''}"/>
                <button class="btn btn-danger btn-sm" type="submit">Eliminar</button>
              </form>
            </div>
          </div>
        </div>

        
        <div class="mt-2" th:if="${actual != null}">
          <a class="btn btn-secondary btn-sm"
             th:href="${actual.padre != null}
                 ? @{/admin/caracteristicas(padreId=${actual.padre.id})}
                 : @{/admin/caracteristicas}">
            &#8592; Subir un nivel
          </a>
        </div>
      </div>
    </div>

    
    <div>
      <div class="panel">
        <h3>Agregar Característica</h3>

        <form method="post" th:action="@{/admin/caracteristicas/crear}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

          <div class="form-group">
            <label>Nombre *</label>
            <input class="form-control" type="text" name="nombre"
                   placeholder="Ej. Java" required/>
          </div>

          <div class="form-group">
            <label>Padre</label>
            <select class="form-control" name="padreId">
              <option value="">(sin padre — categoría raíz)</option>
              <option th:each="p : ${todas}"
                      th:value="${p.id}"
                      th:text="${p.ruta}"
                      th:selected="${actual != null and actual.id == p.id}">
                Padre
              </option>
            </select>
          </div>

          <button class="btn btn-primary w-100" type="submit">Crear</button>
        </form>
      </div>
    </div>

  </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
