<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reportes — Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{layout :: nav}"></nav>

<main style="max-width:500px">
  <h1 class="page-title">Reporte de puestos</h1>
  <p class="page-subtitle">Genera un PDF con todos los puestos publicados en un mes determinado.</p>

  <div class="card">
    <form class="report-form" method="get" th:action="@{/admin/reportes/pdf}">
      <div class="form-row">
        <div class="form-group">
          <label>Año</label>
          <input class="form-control" type="number" name="anio"
                 min="2024" max="2030"
                 th:value="${anioActual}" required/>
        </div>
        <div class="form-group">
          <label>Mes (1–12)</label>
          <input class="form-control" type="number" name="mes"
                 min="1" max="12"
                 th:value="${mesActual}" required/>
        </div>
      </div>

      <div class="btn-group mt-2">
        <button class="btn btn-primary" type="submit">Generar PDF</button>
        <a class="btn btn-secondary" th:href="@{/admin/dashboard}">Volver</a>
      </div>
    </form>
  </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
