<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Oferentes Pendientes — Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{layout :: nav}"></nav>

<main>
  <h1 class="page-title">Oferentes pendientes</h1>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

  <p th:if="${oferentes.isEmpty()}" class="alert alert-info">
    No hay oferentes pendientes de aprobación.
  </p>

  <div class="table-wrapper" th:unless="${oferentes.isEmpty()}">
    <table>
      <thead>
        <tr>
          <th>Usuario (correo)</th>
          <th>Nombre completo</th>
          <th>Identificación</th>
          <th>Teléfono</th>
          <th>Fecha de registro</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="o : ${oferentes}">
          <td th:text="${o.correoElectronico}">correo</td>
          <td><strong th:text="${o.nombreCompleto}">nombre</strong></td>
          <td th:text="${o.identificacion}">id</td>
          <td th:text="${o.telefono ?: '—'}">tel</td>
          <td th:text="${#temporals.format(o.fechaRegistro, 'dd/MM/yyyy')}">fecha</td>
          <td>
            <form method="post"
                  th:action="@{/admin/oferentes/{id}/aprobar(id=${o.id})}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button class="btn btn-success btn-sm" type="submit">
                Aprobar y generar clave
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-2">
    <a class="btn btn-secondary" th:href="@{/admin/dashboard}">Volver</a>
  </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
