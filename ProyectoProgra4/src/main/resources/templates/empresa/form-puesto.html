<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${puestoId != null ? 'Editar Puesto' : 'Publicar Puesto'} + ' — Empresa'">Puesto</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:replace="~{layout :: nav}"></nav>

<main>
  <h1 class="page-title"
      th:text="${puestoId != null ? 'Editar puesto' : 'Publicar nuevo puesto'}">Puesto</h1>

  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <div class="card">
    <form method="post"
          th:action="${puestoId != null}
              ? @{/empresa/puestos/{id}/editar(id=${puestoId})}
              : @{/empresa/puestos/nuevo}"
          th:object="${form}">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      
      <div class="form-group">
        <label>Descripción del puesto *</label>
        <textarea class="form-control" th:field="*{descripcion}" rows="4"
                  placeholder="Ej. Desarrollador Full Stack con experiencia en Java y Spring Boot"
                  required></textarea>
        <span class="field-error" th:if="${#fields.hasErrors('descripcion')}"
              th:errors="*{descripcion}"></span>
      </div>

      <div class="form-group">
        <label>Salario ofrecido (&#8353;)</label>
        <input class="form-control" type="number" step="0.01" min="0"
               th:field="*{salarioOfrecido}" placeholder="Ej. 1200000"/>
      </div>

      <div class="form-check mb-2">
        <input type="checkbox" id="esPublico" th:field="*{esPublico}"/>
        <label for="esPublico">Publicación pública (visible a cualquier visitante)</label>
      </div>

      <hr class="divider"/>

      
      <h3 style="color:var(--primary);margin-bottom:.5rem">Características requeridas</h3>
      <p class="text-muted mb-2">
        Ingrese el nivel mínimo requerido (1–5). Deje <strong>0</strong> si la característica no aplica.
      </p>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Característica</th>
              <th>Ruta completa</th>
              <th style="width:160px">Nivel requerido (0–5)</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${caracteristicas}">
              <td><strong th:text="${c.nombre}">Nombre</strong></td>
              <td class="text-muted" th:text="${c.ruta}">Ruta</td>
              <td>
                <input class="form-control" type="number" min="0" max="5"
                       th:name="|niveles[${c.id}]|"
                       th:value="${form.niveles[c.id]} ?: 0"/>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="btn-group mt-3">
        <button class="btn btn-primary" type="submit">Guardar puesto</button>
        <a class="btn btn-secondary" th:href="@{/empresa/puestos}">Cancelar</a>
      </div>
    </form>
  </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
